<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#f2ede4"/>

  <!-- Dollar sign -->
  <text
    x="5" y="20"
    font-family="Georgia, ui-serif, serif"
    font-size="18"
    font-weight="700"
    fill="#c2410c"
  >$</text>

  <!-- Down arrow -->
  <line x1="23" y1="9" x2="23" y2="22" stroke="#4a7c59" stroke-width="2.5" stroke-linecap="round"/>
